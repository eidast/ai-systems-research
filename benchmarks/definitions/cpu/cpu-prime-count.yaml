id: cpu-prime-count
name: Prime Counting
category: cpu
benchmark_tier: micro
architectural_analog: pure compute validation engine
problem_statement: Count prime numbers less than or equal to N using the same algorithmic intent across implementations.
semantic_equivalence_rules:
  - Use a deterministic prime counting algorithm with equivalent algorithmic complexity.
  - Return the count of primes less than or equal to N.
  - Do not use external native acceleration libraries.
allowed_libraries:
  python: [standard-library]
  go: [standard-library]
  rust: [standard-library]
  typescript: [node-standard-library]
  java: [jdk-standard-library]
  csharp: [dotnet-standard-library]
prohibited_shortcuts:
  - Calling external utilities or system tools to compute primes.
  - Using precomputed lookup tables for target benchmark ranges.
inputs:
  parameter: upper_bound
  default_sizes: [100000, 500000, 1000000]
metrics:
  - wall_time_ms
  - cpu_percent_avg
  - cpu_percent_peak
  - mem_peak_mb
warmup:
  iterations: 3
  required: true
interpretation_limits:
  - Microbenchmark only; insufficient by itself for full architecture recommendations.
  - Stronger for runtime and compute-path comparison than for service-design conclusions.
